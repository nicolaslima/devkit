name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            asset: devkit-darwin-arm64
          - runner: macos-15-intel
            asset: devkit-darwin-amd64
          - runner: ubuntu-24.04-arm
            asset: devkit-linux-arm64
          - runner: ubuntu-24.04
            asset: devkit-linux-amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install TUI dependencies
        run: bun install
        working-directory: tui

      - name: Build host release asset
        run: bash scripts/build-release.sh

      - name: Validate expected asset exists
        run: test -f "dist/release/${{ matrix.asset }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/release/${{ matrix.asset }}
            dist/release/${{ matrix.asset }}.sha256

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: List release files
        run: ls -la dist/release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/devkit-darwin-arm64
            dist/release/devkit-darwin-arm64.sha256
            dist/release/devkit-darwin-amd64
            dist/release/devkit-darwin-amd64.sha256
            dist/release/devkit-linux-arm64
            dist/release/devkit-linux-arm64.sha256
            dist/release/devkit-linux-amd64
            dist/release/devkit-linux-amd64.sha256
